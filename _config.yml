# ==========================================
# 游戏小站 - 站点配置
# ==========================================

# 基本信息
name: 游戏小站
description: 一些游戏开发的笔记和思考
url: "https://mongoliu.github.io"
baseurl: ""

# 作者信息
author:
  name: mongoliu
  email: nmgliuweiqiang@163.com
  github: mongoliu

# 头像
avatar: /images/mine.png

# 社交链接（用于页脚）
social:
  github: mongoliu
  email: nmgliuweiqiang@163.com
  rss: true

# 分页
paginate: 8
paginate_path: "/page:num/"

# 插件（GitHub Pages 白名单）
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-paginate

# 默认 front matter
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: true

# Markdown 解析
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

# Sass
sass:
  style: :compressed

# 永久链接
permalink: /:title/

# giscus 评论配置
# 启用步骤：
# 1. 到仓库 Settings > Features 开启 Discussions
# 2. 到 https://github.com/apps/giscus 安装 giscus App
# 3. 到 https://giscus.app 获取 repo_id 和 category_id 填入下方
giscus:
  repo: "mongoliu/mongoliu.github.io"
  repo_id: ""
  category: "Announcements"
  category_id: ""
  mapping: "pathname"
  reactions: "1"
  theme_light: "light"
  theme_dark: "dark_dimmed"

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - node_modules
  - vendor
